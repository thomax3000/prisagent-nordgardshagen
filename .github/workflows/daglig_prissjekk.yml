# ================================================================
# GitHub Actions — Daglig Prissjekk — Nordgårds Hagen
# Kjører kl. 07:00 norsk tid (06:00 UTC) hver dag.
# Kan også startes manuelt under "Actions"-fanen.
# ================================================================


name: Daglig Prissjekk


on:
  schedule:
    - cron: '0 6 * * *'→ Runs at 06:00   # 07:00 norsk tid (UTC+1) / 08:00 sommertid
  workflow_dispatch:        # Manuell kjøring med ett klikk


permissions:
  contents: write           # Trengs for å committe historikk tilbake til repo


jobs:
  prissjekk:
    runs-on: ubuntu-latest
    timeout-minutes: 30


    steps:
      - name: Hent kode
        uses: actions/checkout@v4


      - name: Sett opp Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'


      - name: Agent 1 - Markedsspeidet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/agent1_markedsspeidet.js


      - name: Agent 2 - Ettersporselsanalytikeren
        run: node agents/agent2_ettersporselsanalytiker.js


      - name: Agent 3 - Prisoptimalisereren
        run: node agents/agent3_prisoptimalisereren.js


      - name: Agent 4 - Strategen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/agent4_strategen.js


      - name: Lagre prishistorikk tilbake til repo
        run: |
          git config --global user.name "Prisagent Bot"
          git config --global user.email "prisagent@nordgardshagen.no"
          git add data/historikk.json
          git diff --staged --quiet || git commit -m "Historikk $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Last opp prisrapport
        uses: actions/upload-artifact@v4
        with:
          name: prisrapport-${{ github.run_number }}
          path: |
            data/rapport.md
            data/optimalisert.json
          retention-days: 60
