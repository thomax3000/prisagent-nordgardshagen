name: Daglig Prissjekk

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prissjekk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Agent 1 - Markedsspeidet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/agent1_markedsspeidet.js

      - name: Agent 2 - Ettersporselsanalytikeren
        run: node agents/agent2_ettersporselsanalytiker.js

      - name: Agent 3 - Prisoptimalisereren
        run: node agents/agent3_prisoptimalisereren.js

      - name: Agent 4 - Strategen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/agent4_strategen.js

      - name: Lagre prishistorikk
        run: |
          git config --global user.name "Prisagent Bot"
          git config --global user.email "prisagent@nordgardshagen.no"
          git add data/historikk.json
          git diff --staged --quiet || git commit -m "Historikk $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Last opp prisrapport
        uses: actions/upload-artifact@v4
        with:
          name: prisrapport-${{ github.run_number }}
          path: |
            data/rapport.md
            data/rapport.html
            data/optimalisert.json
          retention-days: 60

      - name: Send prisrapport paa e-post
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: camplillehammer@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ env.PRISRAPPORT_SUBJECT || 'Prisrapport Nordgards Hagen' }}"
          html_body: file://data/rapport.html
          to: camplillehammer@gmail.com
          from: Prisagent <camplillehammer@gmail.com>

      - name: Vis rapport i logg
        run: cat data/rapport.md
